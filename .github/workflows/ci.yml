name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    name: "Type-check, lint, and test"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
